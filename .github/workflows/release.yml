name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macOS
            sep: ":"
            artifact: simple-edge-tts-macOS
          - os: windows-latest
            platform: Windows
            sep: ";"
            artifact: simple-edge-tts-Windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # Ref: #90 — Extract version from pyproject.toml (single source of truth).
      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"
        shell: bash

      # Ref: #90 — Generate Windows version resource file (VSVersionInfo format).
      # PyInstaller uses --version-file (not --file-version/--product-version).
      - name: Generate version info (Windows)
        if: matrix.platform == 'Windows'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          sed -e "s/__MAJOR__/${MAJOR}/g" \
              -e "s/__MINOR__/${MINOR}/g" \
              -e "s/__PATCH__/${PATCH}/g" \
              -e "s/__VERSION__/${VERSION}/g" \
              version_info.template > version_info.txt
          echo "Generated version_info.txt (v$VERSION)"
          cat version_info.txt
        shell: bash

      - name: Build with PyInstaller
        run: |
          # On Windows, find and force-include vcruntime140.dll for portability
          # (PyInstaller excludes it by default, assuming system-installed)
          VCRT_FLAG=""
          if [ "${{ matrix.platform }}" = "Windows" ]; then
            PYTHON_DIR=$(cygpath -w "$(dirname "$(which python)")")
            for dll in vcruntime140.dll vcruntime140_1.dll; do
              NATIVE_PATH="$PYTHON_DIR\\$dll"
              if [ -f "$(cygpath -u "$NATIVE_PATH")" ]; then
                VCRT_FLAG="$VCRT_FLAG --add-binary $NATIVE_PATH${{ matrix.sep }}."
              fi
            done
            echo "VC Runtime flags: $VCRT_FLAG"
          fi

          # Use version-file if it was generated (Windows only)
          VERSION_FILE_FLAG=""
          if [ -f version_info.txt ]; then
            VERSION_FILE_FLAG="--version-file version_info.txt"
          fi

          uv run pyinstaller \
            --name simple-edge-tts \
            --windowed \
            --onedir \
            --noupx \
            --add-data "src/resources${{ matrix.sep }}src/resources" \
            --add-data "src/static${{ matrix.sep }}src/static" \
            --add-data "frontend/dist${{ matrix.sep }}frontend/dist" \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import edge_tts \
            --noconfirm \
            $VCRT_FLAG \
            $VERSION_FILE_FLAG \
            src/main.py
        shell: bash

      # Ref: #90 — Patch Info.plist with correct version before packaging .dmg.
      - name: Patch Info.plist version (macOS)
        if: matrix.platform == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          plutil -replace CFBundleShortVersionString -string "$VERSION" dist/simple-edge-tts.app/Contents/Info.plist
          plutil -replace CFBundleVersion -string "$VERSION" dist/simple-edge-tts.app/Contents/Info.plist
          echo "Info.plist version set to $VERSION"

      - name: Create .dmg (macOS)
        if: matrix.platform == 'macOS'
        run: |
          # Ref: #66 — Stage .app + Applications symlink for drag-to-install DMG.
          # hdiutil -srcfolder must point at a folder containing the .app
          # (not the PyInstaller onedir folder, which lacks .app structure).
          staging="dist/dmg-staging"
          rm -rf "$staging"
          mkdir -p "$staging"
          cp -R "dist/simple-edge-tts.app" "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create \
            -volname "simple-edge-tts" \
            -srcfolder "$staging" \
            -ov -format UDZO \
            dist/simple-edge-tts.dmg
          rm -rf "$staging"

      - name: Create .zip (Windows)
        if: matrix.platform == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/simple-edge-tts -DestinationPath dist/simple-edge-tts-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/simple-edge-tts.dmg
            dist/simple-edge-tts-windows.zip
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.dmg" -o -name "*.zip" \) -exec sha256sum {} \; | \
            sed 's|  \./[^/]*/|  |' > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            SHA256SUMS.txt
          generate_release_notes: true

