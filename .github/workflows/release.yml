name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macOS
            sep: ":"
            artifact: simple-edge-tts-macOS
          - os: windows-latest
            platform: Windows
            sep: ";"
            artifact: simple-edge-tts-Windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller \
            --name simple-edge-tts \
            --windowed \
            --onedir \
            --add-data "src/resources${{ matrix.sep }}src/resources" \
            --add-data "src/static${{ matrix.sep }}src/static" \
            --add-data "frontend/dist${{ matrix.sep }}frontend/dist" \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import edge_tts \
            --noconfirm \
            src/main.py
        shell: bash

      - name: Create .dmg (macOS)
        if: matrix.platform == 'macOS'
        run: |
          # Ref: #66 — Stage .app + Applications symlink for drag-to-install DMG.
          # hdiutil -srcfolder must point at a folder containing the .app
          # (not the PyInstaller onedir folder, which lacks .app structure).
          staging="dist/dmg-staging"
          rm -rf "$staging"
          mkdir -p "$staging"
          cp -R "dist/simple-edge-tts.app" "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create \
            -volname "simple-edge-tts" \
            -srcfolder "$staging" \
            -ov -format UDZO \
            dist/simple-edge-tts.dmg
          rm -rf "$staging"

      - name: Create .zip (Windows)
        if: matrix.platform == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/simple-edge-tts -DestinationPath dist/simple-edge-tts-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/simple-edge-tts.dmg
            dist/simple-edge-tts-windows.zip
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.dmg" -o -name "*.zip" \) -exec sha256sum {} \; | \
            sed 's|  \./[^/]*/|  |' > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            SHA256SUMS.txt
          generate_release_notes: true

