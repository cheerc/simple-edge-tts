<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SET</title>
    <!--
      Ref: #73 — Theme-aware loading splash.
      1. Blocking script sets data-theme on <html> BEFORE any paint, matching
         the same priority as useTheme.ts: localStorage → prefers-color-scheme → light.
      2. Inline CSS uses [data-theme] selectors for splash colors.
      3. Splash lives inside <div id="root"> so React's createRoot().render()
         automatically replaces it on mount — no manual cleanup needed.
    -->
    <script>
      // Ref: #73 — Synchronous theme detection, mirrors useTheme.ts logic.
      // Must run before first paint to avoid background color flash.
      (function() {
        var t = localStorage.getItem('theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <style>
      /* Ref: #73 — Splash screen styles. Uses hardcoded values matching
         index.css theme tokens so the splash renders correctly before
         the CSS bundle loads. */
      body {
        margin: 0;
        background: #fafafa; /* light default */
      }
      [data-theme="dark"] body {
        background: #1a1a2e;
      }

      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .splash-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(204, 74, 53, 0.2);  /* --primary with low opacity */
        border-top-color: #cc4a35;                   /* --primary (coral accent) */
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }

      .splash-text {
        color: #333333; /* light foreground */
        font-size: 13px;
        letter-spacing: 0.5px;
        opacity: 0.6;
      }
      [data-theme="dark"] .splash-text {
        color: #e8e8e8;
      }

      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Ref: #73 — CSS-only splash, replaced when React mounts -->
      <div class="splash">
        <div class="splash-spinner"></div>
        <div class="splash-text">Loading…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
